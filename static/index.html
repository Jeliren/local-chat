<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <section id="auth-screen" class="auth-screen">
      <form id="login-form" class="auth-card">
        <p class="eyebrow">Защищенный вход</p>
        <h1>Local Chat</h1>
        <p class="subtitle">Сначала введите пароль, а потом попадёте в общий чат и личные сообщения.</p>

        <label for="login-username">Ваше имя</label>
        <input id="login-username" maxlength="40" placeholder="Например, Alex" />

        <label for="login-password">Пароль</label>
        <input id="login-password" type="password" placeholder="Введите пароль чата" />

        <button type="submit">Войти</button>
        <p id="login-hint" class="hint">Пароль задаётся на сервере. Для смены используйте переменную окружения <code>CHAT_PASSWORD</code>.</p>
        <p id="login-error" class="error-text" hidden></p>
      </form>
    </section>

    <div id="app-shell" class="app-shell is-hidden">
      <header class="topbar">
        <h1>Local Chat</h1>
        <div id="current-user" class="current-user-chip">...</div>
        <button id="logout-button" class="secondary-button" type="button">Выйти</button>
      </header>

      <section class="card recipient-panel">
        <details id="recipient-details">
          <summary class="recipient-summary">
            <span>Кому отправляем</span>
            <span id="recipient-current" class="recipient-current">Всем</span>
          </summary>
          <div id="recipient-options" class="recipient-options" role="radiogroup" aria-label="Кому отправляем"></div>
        </details>
      </section>

      <main class="chat-panel">
        <section id="messages" class="messages" aria-live="polite"></section>

        <section class="composer card">
          <form id="message-form" class="message-form">
            <textarea
              id="message-input"
              rows="3"
              placeholder="Напишите сообщение..."
            ></textarea>
            <button type="submit">Отправить сообщение</button>
          </form>

          <form id="file-form" class="file-form">
            <label class="file-picker" for="file-input">Выбрать файл</label>
            <input id="file-input" type="file" />
            <span id="file-name" class="file-name">Файл не выбран</span>
            <button type="submit">Отправить файл</button>
          </form>
        </section>
      </main>
    </div>

    <template id="empty-state-template">
      <div class="empty-state">
        <p>Пока сообщений нет. Начните общий чат или отправьте личное сообщение.</p>
      </div>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
  </html>
